<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Simple HTML Calculator</title>

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Simple HTML Calculator">
    <meta name="author" content="Samuel Wright">

    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div id="app">
        <form name="calc" id="form">
            <div class="calc-container">
                <input type="number" id="calc-input"/>

                <button id="num-1" class="num">1</button>
                <button id="num-2" class="num">2</button>
                <button id="num-3" class="num">3</button>
                <button id="add" class="operation">+</button>

                <button id="num-4" class="num">4</button>
                <button id="num-5" class="num">5</button>
                <button id="num-6" class="num">6</button>
                <button id="subtract" class="operation">-</button>

                <button id="num-7" class="num">7</button>
                <button id="num-8" class="num">8</button>
                <button id="num-9" class="num">9</button>
                <button id="multiply" class="operation">x</button>

                <button id="num-0" class="num">0</button>
                <button id="divide" class="operation">/</button>

                <button type="submit" id="submit-btn">=</button>
            </div>
            
        </form>
    </div>
    <script src="index.js"></script>
  </body>
</html>
